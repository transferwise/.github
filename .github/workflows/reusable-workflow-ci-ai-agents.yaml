name: AI agents in CI

on:
  workflow_call:
    inputs:
      event_name:
        description: "Event name from the caller workflow"
        required: true
        type: string
      event_payload:
        description: "JSON payload captured from the caller event"
        required: true
        type: string
      repository:
        description: "Full repository name of the caller (owner/repo)"
        required: true
        type: string
      ref:
        description: "Git ref from the caller"
        required: true
        type: string
      sha:
        description: "Git SHA from the caller"
        required: true
        type: string
      actor:
        description: "Actor that triggered the caller workflow"
        required: true
        type: string
      failed_run_id:
        description: "Workflow run ID to debug when event_name is workflow_run"
        required: false
        type: number
        default: 0
      team:
        description: "Team name"
        required: false
        type: string
      custom_prompt:
        description: "Custom prompt to use instead of the default prompt"
        required: false
        type: string
      debugging_model:
        description: "LLM model to use for debugging failed CI runs"
        required: false
        type: string
      generic_model:
        description: "LLM model to use for general purpose tasks"
        required: false
        type: string

jobs:
  run-ci-ai-agent:
    if: |
      inputs.event_name == 'push' ||
      inputs.event_name == 'issues' ||
      inputs.event_name == 'issue_comment' ||
      inputs.event_name == 'pull_request' ||
      inputs.event_name == 'pull_request_review_comment' ||
      inputs.event_name == 'pull_request_review'
    runs-on: gha-production-medium
    container: ci-images-release.arti.tw.ee/actions_java_17_and_21
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      PR_PROMPT: |
          - Review this pull request in three strict phases, in this exact order: (1) per-file review, (2) overall PR comment, (3) PR description update. Complete all phases.

          Phase 1 - Per-file review (required, first):
          - Review each changed file independently before writing any overall PR summary.
          - For each file, build an internal object with this schema:
            { summary: string, comments: [{ start: number, end: number, comment: string }] }
          - The summary must capture important changes, potential pitfalls, and unforeseen consequences using repository context and downstream usage impact.
          - The comments list must contain only specific, objective, code-related corrections worth posting inline.
          - If you leave review findings, they must always be inline comments anchored to exact lines in the current file.
          - Use mcp__github_inline_comment__create_inline_comment for every inline comment you post.
          - Comment only on the most pressing issues. Most files should have no comments.
          - Do not provide vague advice such as "check", "verify", "consider", or "ensure".
          - Do not make subjective suggestions unrelated to logic and execution.
          - Do not comment on infrastructure/environment configuration or monitoring outside the codebase.
          - Do not ask the author to validate dependencies, compatibility, standards, or behavior unless there is explicit evidence of a concrete defect.
          - Assume additions/deletions and design decisions are intentional unless contradicted by clear evidence.
          - Assume functions/classes in dependencies or other modules are correct unless the diff proves otherwise.
          - Do not ask for docstrings, logging improvements, or documentation updates unless current content is specifically incorrect.
          - Never restate the obvious code change in comments; only provide explicit corrections.
          - Each inline comment must be extremely short, direct, and actionable.
          - For each inline comment, set start/end to line numbers in the new file (unless the file is deleted).
          - start and end must be within the same diff hunk and span at most 20 lines.
          - Comment only on the smallest relevant lines, never broad sections.
          - If a whole file was deleted and there is a valid issue, create at most one file-level comment.
          - If you cannot access enough context to review meaningfully, set the file summary to an explicit error statement and produce no comments for that file.
          - Only comment on the current file being reviewed; do not mix findings from other files.

          Phase 2 - Overall PR comment:
          - After all files are reviewed, write one top-level PR comment.
          - Summarize changes in order of importance using no more than 4 short bullet points.
          - Optionally add up to 2 bullets for concrete pitfalls, unforeseen consequences, or clear code-reuse opportunities.
          - Keep the comment concise (prefer 50-100 words total).
          - Avoid generic statements and open-ended reviewer tasks.
          - Include only meaningful, actionable, non-vague points.
          - Do not place corrective review findings in this top-level comment; put those only in inline comments.
          - Use file summaries from Phase 1 as source material.

          Phase 3 - Update PR description:
          - Update the PR body by appending or refreshing a concise "AI Review Summary by Claude" section.
          - Preserve all existing author-written PR description content.
          - The section must include: key changes, high-risk areas/pitfalls, and notable follow-up items (if any).
          - Do not include checkboxes in the PR description update section.
          - Keep it factual, short, and aligned with Phase 1/Phase 2 findings.

          Tone and scope:
          - Professional and friendly.
          - High signal only: prioritize correctness, security, reliability, and performance.
          - If reliable review is not possible, say so briefly and do not invent findings.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: "Add repo as safe directory"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Sync caller event context
        shell: bash
        env:
          CALLER_EVENT_PAYLOAD: ${{ inputs.event_payload }}
        run: |
          event_file="$RUNNER_TEMP/original_event.json"
          printf '%s' "$CALLER_EVENT_PAYLOAD" > "$event_file"
          {
            echo "GITHUB_EVENT_PATH=$event_file"
            echo "GITHUB_EVENT_NAME=${{ inputs.event_name }}"
            echo "GITHUB_REPOSITORY=${{ inputs.repository }}"
            echo "GITHUB_REF=${{ inputs.ref }}"
            echo "GITHUB_SHA=${{ inputs.sha }}"
            echo "GITHUB_ACTOR=${{ inputs.actor }}"
          } >> "$GITHUB_ENV"

      - name: Run AI Agent
        uses: transferwise/claude-code-action@main
        with:
          prompt: ${{ inputs.custom_prompt != '' && inputs.custom_prompt || (inputs.event_name == 'pull_request' && env.PR_PROMPT || '') }}
          trigger_phrase: "/run-ci-ai-agents"
          use_commit_signing: "true"
          anthropic_bedrock_base_url: ${{ secrets.ANTHROPIC_BEDROCK_BASE_URL }}
          anthropic_default_sonnet_model: ${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          anthropic_default_haiku_model: ${{ vars.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          anthropic_default_opus_model: ${{ vars.ANTHROPIC_DEFAULT_OPUS_MODEL }}
          x-wise-llm-gateway-team: ${{ inputs.team }}
          x-wise-llm-gateway-lite-auth-caller-id: ${{ inputs.actor }}
          experimental_allowed_domains: |
            github.com
            api.github.com
            ${{ secrets.ANTHROPIC_BEDROCK_BASE_URL }}
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_file,mcp__github__update_pull_request, mcp__github__get_pull_request,mcp__github__get_pull_request_diff,mcp__github__get_pull_request_files"
            --model ${{ inputs.generic_model != '' && inputs.generic_model || vars.ANTHROPIC_DEFAULT_OPUS_MODEL }}

      - name: Show Claude execution output
        if: always()
        run: |
          cat /__w/_temp/claude-execution-output.json
